<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "error-container": "#93000a",
                  "surface-tint": "#ffb59c",
                  "error": "#ffb4ab",
                  "on-background": "#e4e2e5",
                  "on-surface-variant": "#e7bdb0",
                  "on-tertiary": "#2e2f3e",
                  "secondary-fixed-dim": "#77dc7a",
                  "on-secondary-fixed-variant": "#005316",
                  "surface-container-lowest": "#0e0e11",
                  "inverse-surface": "#e4e2e5",
                  "primary": "#ffb59c",
                  "on-primary": "#5c1a00",
                  "on-secondary": "#00390c",
                  "on-surface": "#e4e2e5",
                  "surface-container": "#1f1f22",
                  "secondary-fixed": "#93f993",
                  "on-primary-fixed-variant": "#822800",
                  "surface-variant": "#343437",
                  "surface": "#131316",
                  "on-secondary-container": "#93f993",
                  "secondary-container": "#005316",
                  "on-tertiary-fixed-variant": "#444655",
                  "primary-container": "#822800",
                  "surface-bright": "#39393c",
                  "surface-container-high": "#2a2a2d",
                  "primary-fixed-dim": "#ffb59c",
                  "on-error": "#690005",
                  "tertiary-container": "#444655",
                  "surface-container-low": "#1b1b1e",
                  "background": "#131316",
                  "outline-variant": "#5d4036",
                  "tertiary-fixed-dim": "#c5c5d8",
                  "on-primary-fixed": "#380c00",
                  "on-tertiary-container": "#e1e1f5",
                  "on-primary-container": "#ffdbcf",
                  "surface-container-highest": "#343437",
                  "inverse-on-surface": "#303033",
                  "primary-fixed": "#ffdbcf",
                  "on-secondary-fixed": "#002105",
                  "on-tertiary-fixed": "#191b29",
                  "surface-dim": "#131316",
                  "secondary": "#77dc7a",
                  "outline": "#ad887c",
                  "inverse-primary": "#a43c12",
                  "tertiary-fixed": "#e1e1f5",
                  "tertiary": "#c5c5d8",
                  "on-error-container": "#ffdad6"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Plus Jakarta Sans"],
                  "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-effect {
      background: rgba(31, 31, 34, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    .metallic-brushed {
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.05) 100%);
    }
    .hardware-texture {
      background-image: radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
      background-size: 24px 24px;
    }
    .nut-hex {
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    }
    .bolt-glow {
      box-shadow: 0 0 30px rgba(255, 181, 156, 0.15);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 hardware-texture">
<!-- Main Gameplay Background (Blurred) -->
<div class="fixed inset-0 z-0 overflow-hidden blur-lg grayscale-[0.4] opacity-30 pointer-events-none">
<!-- Top Bar Mock -->
<header class="w-full pt-4 px-6 flex justify-between items-center max-w-xl mx-auto">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">grid_view</span>
</div>
<span class="font-headline font-bold tracking-tight text-xl text-primary">Level 42</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined">palette</span>
</div>
</header>
<!-- Gameplay Area Mock -->
<main class="max-w-xl mx-auto p-8 grid grid-cols-3 gap-8 mt-12">
<!-- Bolt Items -->
<div class="h-64 bg-surface-container-low rounded-xl flex flex-col items-center justify-end pb-4 relative">
<div class="w-4 h-full bg-surface-variant absolute top-0 rounded-full opacity-20"></div>
<div class="w-16 h-8 bg-secondary rounded-sm shadow-lg z-10 metallic-brushed border-b-2 border-black/20"></div>
<div class="w-16 h-8 bg-secondary rounded-sm shadow-lg z-10 metallic-brushed -mb-2 border-b-2 border-black/20"></div>
</div>
<div class="h-64 bg-surface-container-low rounded-xl flex flex-col items-center justify-end pb-4 relative">
<div class="w-4 h-full bg-surface-variant absolute top-0 rounded-full opacity-20"></div>
<div class="w-16 h-8 bg-primary rounded-sm shadow-lg z-10 metallic-brushed border-b-2 border-black/20"></div>
</div>
<div class="h-64 bg-surface-container-low rounded-xl flex flex-col items-center justify-end pb-4 relative">
<div class="w-4 h-full bg-surface-variant absolute top-0 rounded-full opacity-20"></div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-surface-lowest/60 backdrop-blur-md">
<!-- Level Complete Modal -->
<div class="relative w-full max-w-sm glass-effect rounded-[2.5rem] overflow-hidden shadow-[0_32px_64px_-12px_rgba(0,0,0,0.5)] border border-white/10 flex flex-col items-center p-8 text-center metallic-brushed">
<!-- Content Container -->
<div class="relative z-10 w-full">
<!-- Hardware Inspired Star Decoration -->
<div class="mb-8 flex justify-center items-end gap-3 h-32">
<!-- Left Hardware Star -->
<div class="w-14 h-14 bg-surface-container-highest nut-hex flex items-center justify-center text-primary/40 transform -rotate-12 mb-2 scale-90 border border-white/5 relative">
<div class="absolute inset-0 bg-gradient-to-tr from-black/20 to-white/10"></div>
<span class="material-symbols-outlined !text-3xl relative z-10" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<!-- Center Hardware Nut Star (Larger) -->
<div class="w-24 h-24 bg-surface-container-highest nut-hex flex items-center justify-center text-primary shadow-2xl bolt-glow z-20 relative scale-110">
<div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-white/20"></div>
<div class="w-18 h-18 bg-primary-container rounded-full flex items-center justify-center border-4 border-surface-container-highest shadow-inner">
<span class="material-symbols-outlined !text-6xl" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Right Hardware Star -->
<div class="w-14 h-14 bg-surface-container-highest nut-hex flex items-center justify-center text-primary/40 transform rotate-12 mb-2 scale-90 border border-white/5 relative">
<div class="absolute inset-0 bg-gradient-to-tr from-black/20 to-white/10"></div>
<span class="material-symbols-outlined !text-3xl relative z-10" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-headline text-4xl font-black tracking-tight text-on-surface mb-2 uppercase italic">Excellent Sort!</h1>
<p class="text-on-surface-variant font-semibold mb-8 tracking-wide">COMPLETED IN 18 MOVES</p>
<!-- Stats Card (Toolbox Style) -->
<div class="bg-black/40 rounded-2xl p-5 mb-10 flex justify-between items-center px-10 border border-white/5 shadow-inner">
<div class="flex flex-col items-center">
<span class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/70 mb-1">Time</span>
<span class="font-headline font-bold text-2xl text-on-surface">01:24</span>
</div>
<div class="w-px h-10 bg-white/10 shadow-[1px_0_0_rgba(0,0,0,0.3)]"></div>
<div class="flex flex-col items-center">
<span class="text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/70 mb-1">Bonus</span>
<span class="font-headline font-bold text-2xl text-secondary">+250</span>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4 w-full">
<!-- Primary CTA (Industrial Button) -->
<button class="group relative w-full bg-gradient-to-b from-primary to-[#c27658] h-18 rounded-2xl flex items-center justify-center gap-3 active:scale-[0.98] transition-all duration-150 shadow-[0_8px_0_#822800,0_15px_30px_rgba(130,40,0,0.4)] overflow-hidden border-t border-white/30">
<span class="relative z-10 font-headline font-black text-on-primary text-2xl tracking-tighter uppercase italic">Next Level</span>
<span class="relative z-10 material-symbols-outlined text-on-primary font-black !text-3xl">arrow_forward</span>
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
</button>
<!-- Secondary Actions -->
<div class="flex justify-center gap-10 mt-6">
<button class="flex flex-col items-center gap-2 group active:scale-90 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary group-hover:bg-surface-variant transition-colors shadow-lg border border-white/5 metallic-brushed">
<span class="material-symbols-outlined !text-3xl">undo</span>
</div>
<span class="text-[10px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Replay</span>
</button>
<button class="flex flex-col items-center gap-2 group active:scale-90 transition-transform">
<div class="w-14 h-14 rounded-2xl bg-surface-container-high flex items-center justify-center text-on-surface-variant group-hover:text-primary group-hover:bg-surface-variant transition-colors shadow-lg border border-white/5 metallic-brushed">
<span class="material-symbols-outlined !text-3xl">share</span>
</div>
<span class="text-[10px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Share</span>
</button>
</div>
</div>
</div>
<!-- Ambient Light Effect -->
<div class="absolute -top-32 -left-32 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-32 -right-32 w-64 h-64 bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
</div>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-[60] flex justify-around items-center px-4 py-3 bg-surface/90 backdrop-blur-2xl rounded-t-[2.5rem] pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/5 opacity-40 pointer-events-none">
<div class="flex flex-col items-center justify-center bg-primary/10 text-primary rounded-xl px-5 py-2 border border-primary/20">
<span class="material-symbols-outlined">build</span>
<span class="text-[10px] font-black uppercase tracking-widest">Bolt</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface/40 px-5 py-2">
<span class="material-symbols-outlined">undo</span>
<span class="text-[10px] font-black uppercase tracking-widest">Undo</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface/40 px-5 py-2">
<span class="material-symbols-outlined">lightbulb</span>
<span class="text-[10px] font-black uppercase tracking-widest">Hint</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface/40 px-5 py-2">
<span class="material-symbols-outlined">menu</span>
<span class="text-[10px] font-black uppercase tracking-widest">Menu</span>
</div>
</nav>
</body></html>
