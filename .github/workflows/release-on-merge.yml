name: Release on Merge

on:
    push:
        branches: [main]

permissions:
    contents: write

jobs:
    bump-version:
        name: Bump package version on merge
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install dependencies
              run: npm ci

            - name: Run release (standard-version)
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Configure git user for automated commits
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

                  # Run standard-version to bump package.json, changelog, and create a tag
                  npm run release

                  # Push commits and tags back to the repository using the token
                  git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} --follow-tags
